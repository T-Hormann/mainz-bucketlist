<style>
:root{
  --red:#b3203c; --red-dark:#8e1830;
  --bg:#f6f4f1; --card:#ffffff; --text:#1c1b1a; --muted:#8a857e;
  --line:#e9e5e0; --green:#2e9e5b;
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg); color:var(--text);
  padding-bottom:env(safe-area-inset-bottom);
}
header{
  background:linear-gradient(135deg,var(--red),var(--red-dark));
  color:#fff; padding:calc(14px + env(safe-area-inset-top)) 18px 14px;
  position:sticky; top:0; z-index:20;
}
header h1{font-size:20px; font-weight:700; letter-spacing:.2px}
.progress-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.progress-bar{flex:1;height:6px;background:rgba(255,255,255,.25);border-radius:3px;overflow:hidden}
.progress-bar i{display:block;height:100%;background:#fff;border-radius:3px;transition:width .4s}
.progress-label{font-size:12px;opacity:.9;white-space:nowrap;font-variant-numeric:tabular-nums}
.tabs{
  display:flex;gap:8px;overflow-x:auto;padding:12px 14px 4px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:0 0 auto;border:1px solid var(--line);background:var(--card);
  border-radius:999px;padding:8px 14px;font-size:14px;font-weight:600;
  color:var(--text);display:flex;align-items:center;gap:6px;cursor:pointer;
}
.tab small{font-weight:500;color:var(--muted);font-size:12px;font-variant-numeric:tabular-nums}
.tab.active{background:var(--red);border-color:var(--red);color:#fff}
.tab.active small{color:rgba(255,255,255,.8)}
.controls{padding:8px 14px 0;display:flex;flex-direction:column;gap:8px}
.search{
  width:100%;border:1px solid var(--line);border-radius:12px;background:var(--card);
  padding:10px 14px;font-size:16px;color:var(--text);outline:none;
}
.search::placeholder{color:var(--muted)}
.seg{display:flex;background:#ece9e4;border-radius:10px;padding:3px}
.seg button{
  flex:1;border:0;background:transparent;border-radius:8px;padding:7px 0;
  font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;
}
.seg button.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.12)}
main{padding:10px 14px 40px}
.cat-head{
  display:flex;align-items:baseline;justify-content:space-between;
  margin:18px 2px 8px;
}
.cat-head h2{font-size:16px;font-weight:700}
.cat-head span{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.list{background:var(--card);border-radius:var(--radius);overflow:hidden;border:1px solid var(--line)}
.item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  border-bottom:1px solid var(--line);cursor:pointer;
}
.item:last-child{border-bottom:0}
.check{
  flex:0 0 26px;height:26px;width:26px;border-radius:50%;
  border:2px solid #cfc9c2;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:#fff;transition:all .15s;
}
.item.done .check{background:var(--green);border-color:var(--green)}
.item-body{flex:1;min-width:0}
.item-body b{display:block;font-size:15px;font-weight:600;line-height:1.3}
.item-body span.d{display:block;font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.item.done .item-body b{color:var(--muted);text-decoration:line-through}
.chev{color:#cfc9c2;font-size:18px}
.empty{padding:30px 10px;text-align:center;color:var(--muted);font-size:14px}
/* Aggregierte Anzeige */
.meta{display:flex;align-items:center;gap:10px;margin-top:5px;flex-wrap:wrap}
.who{display:inline-flex;align-items:center}
.av{display:inline-flex;align-items:center;justify-content:center;width:21px;height:21px;border-radius:50%;color:#fff;font-size:9.5px;font-weight:700;margin-right:-5px;border:1.5px solid var(--card)}
.av:last-child{margin-right:0}
.avg{font-size:11px;letter-spacing:.5px;color:var(--muted);white-space:nowrap}
.avg b{color:var(--text);font-weight:600}
/* Detail-Sheet */
.backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.backdrop.open{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:var(--bg);border-radius:20px 20px 0 0;
  max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  transform:translateY(105%);transition:transform .3s cubic-bezier(.3,.7,.3,1);
  padding:10px 18px calc(24px + env(safe-area-inset-bottom));
}
.sheet.open{transform:translateY(0)}
.grip{width:38px;height:4px;border-radius:2px;background:#d5d0c9;margin:4px auto 14px}
.badge{
  display:inline-block;font-size:12px;font-weight:600;color:var(--red);
  background:rgba(179,32,60,.1);border-radius:999px;padding:4px 10px;margin-bottom:8px;
}
.sheet h2{font-size:22px;font-weight:700;line-height:1.25}
.sheet p.desc{font-size:15px;line-height:1.5;color:#444;margin:10px 0 4px}
.sheet p.addr{font-size:13.5px;color:var(--muted);margin:6px 0 14px}
.map{
  width:100%;height:240px;border:0;border-radius:14px;background:#e6e2dc;display:block;
}
.btn-row{display:flex;gap:10px;margin-top:14px}
.btn{
  flex:1;border:0;border-radius:13px;padding:14px 10px;font-size:15px;font-weight:700;
  cursor:pointer;text-align:center;text-decoration:none;display:block;
}
.btn.check-btn{background:var(--card);border:1.5px solid var(--line);color:var(--text)}
.btn.check-btn.done{background:var(--green);border-color:var(--green);color:#fff}
.btn.maps{background:var(--red);color:#fff}
.rating{display:flex;align-items:center;gap:2px;margin-top:14px}
.rating .rlabel{font-size:13px;color:var(--muted);margin-right:8px}
.rating .glass{border:0;background:none;font-size:27px;opacity:.22;cursor:pointer;padding:2px;filter:grayscale(1)}
.rating .glass.on{opacity:1;filter:none}
/* Personen-Box im Sheet */
.peoplebox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-top:16px}
.peoplebox h3{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:9px;text-transform:uppercase;letter-spacing:.4px}
.prow{display:flex;align-items:center;gap:9px;font-size:14px;margin:7px 0}
.prow .nm{flex:1}
.prow .gl{letter-spacing:1px}
.pnone{font-size:13.5px;color:var(--muted)}
.pavg{margin-top:9px;padding-top:9px;border-top:1px solid var(--line);font-size:13px;color:var(--muted)}
.pavg b{color:var(--text)}
#map{display:none;height:62vh;min-height:340px;margin:10px 14px;border-radius:16px;border:1px solid var(--line);z-index:1}
body.mapview #map{display:block}
body.mapview main{display:none}
.leaflet-popup-content{font-family:inherit;font-size:14px}
.leaflet-popup-content b{display:block;margin-bottom:3px}
.leaflet-popup-content a{color:var(--red);font-weight:700;text-decoration:none}
footer{padding:22px 18px 40px;text-align:center}
.me-row{font-size:13px;color:var(--muted)}
.me-row b{color:var(--text)}
.me-row button{border:0;background:none;color:var(--red);font-size:13px;text-decoration:underline;cursor:pointer;padding:6px}
/* Profil-/Join-Overlay */
.overlay{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;padding:26px;text-align:center}
.overlay.show{display:flex}
.overlay .logo{font-size:34px;margin-bottom:14px}
.overlay h2{font-size:23px;font-weight:700;margin-bottom:8px}
.overlay p{color:var(--muted);font-size:14.5px;line-height:1.5;margin-bottom:24px;max-width:320px}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:330px}
.pbtn{display:flex;flex-direction:column;align-items:center;gap:11px;padding:20px 10px;background:var(--card);border:1px solid var(--line);border-radius:18px;cursor:pointer;font-size:15px;font-weight:600;color:var(--text);transition:transform .1s}
.pbtn:active{transform:scale(.96)}
.pbtn .bigav{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:21px;font-weight:700}
.synced{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.85);margin-top:7px}
.synced .dot{width:7px;height:7px;border-radius:50%;background:#9be7b4}
.synced.off .dot{background:#ffd27f}
</style>
</head>

// ======== Identität: Gruppen-Code + Profil ========
(function(){
  // Code aus dem Einladungslink lesen und merken.
  // Wichtig: Der #join-Code bleibt bewusst in der URL stehen, damit ein zum
  // Home-Bildschirm hinzugefügtes Icon (eigener Speicher, getrennt von Safari)
  // den Code mitspeichert und die App auch dort freischaltet.
  // Der Hash wird nie an einen Server übertragen.
  try{
    const h=(location.hash||"").match(/join=([^&]+)/);
    if(h){ localStorage.setItem("ag-code", decodeURIComponent(h[1])); }
  }catch(e){}
})();
let groupCode = localStorage.getItem("ag-code") || "";

// ======== Verschlüsselung (AES-256-GCM, Schlüssel aus Gruppen-Code) ========
const APP_SALT = "agraffen-mainz-bucketlist-v2";
const te = new TextEncoder(), td = new TextDecoder();
const b64  = arr => btoa(String.fromCharCode.apply(null, arr));
const ub64 = s => Uint8Array.from(atob(s), c=>c.charCodeAt(0));
async function deriveKey(code){
  const base = await crypto.subtle.importKey("raw", te.encode(code), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:te.encode(APP_SALT), iterations:150000, hash:"SHA-256"},
    base, {name:"AES-GCM", length:256}, false, ["encrypt","decrypt"]);
}
async function derivePath(code){
  const buf = await crypto.subtle.digest("SHA-256", te.encode(APP_SALT+"|path|"+code));
  return "g"+[...new Uint8Array(buf)].slice(0,16).map(b=>b.toString(16).padStart(2,"0")).join("");
}
async function encryptObj(key,obj){
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, te.encode(JSON.stringify(obj)));
  return {iv:b64(iv), ct:b64(new Uint8Array(ct))};
}
async function decryptObj(key,blob){
  try{
    const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:ub64(blob.iv)}, key, ub64(blob.ct));
    return JSON.parse(td.decode(pt));
  }catch(e){ return null; }
}

// ======== Daten / State ========
let done={}, ratings={};          // mein eigener Stand
let members={};                   // name -> {done:{}, ratings:{}}
let cryptoKey=null, dbPath="", membersRef=null;

function loadLocal(){
  try{ const o=JSON.parse(localStorage.getItem("ag-data-"+profile)||"{}"); done=o.done||{}; ratings=o.ratings||{}; }
  catch(e){ done={}; ratings={}; }
  members[profile]={done:{...done}, ratings:{...ratings}};
}
function save(){
  try{ localStorage.setItem("ag-data-"+profile, JSON.stringify({done,ratings})); }catch(e){}
  members[profile]={done:{...done}, ratings:{...ratings}};
  pushMine();
}

// ======== Firebase-Sync ========
function setSync(on,txt){
  const el=document.getElementById("synced"); if(!el)return;
  el.classList.toggle("off",!on);
  document.getElementById("syncedtxt").textContent=txt;
}
function initFirebase(){
  try{ if(!firebase.apps.length) firebase.initializeApp(firebaseConfig); }
  catch(e){ setSync(false,"offline"); return; }
  const db=firebase.database();
  membersRef=db.ref("groups/"+dbPath+"/members");
  membersRef.on("value", async snap=>{
    const val=snap.val()||{};
    const next={};
    for(const name in val){
      if(name===profile) continue;
      const dec=await decryptObj(cryptoKey, val[name]);
      if(dec) next[name]={done:dec.done||{}, ratings:dec.ratings||{}};
    }
    next[profile]={done:{...done}, ratings:{...ratings}};
    members=next;
    setSync(true, MEMBERS.filter(n=>members[n]).length+" Profile · synchron");
    render();
  }, err=>{ setSync(false,"offline"); });
  pushMine();
}
let pushT=null;
function pushMine(){
  if(!membersRef||!cryptoKey) return;
  clearTimeout(pushT);
  pushT=setTimeout(async()=>{
    try{ const blob=await encryptObj(cryptoKey,{done,ratings,updated:Date.now()}); membersRef.child(profile).set(blob); }
    catch(e){}
  },400);
}

// ======== Aggregation über alle Profile ========
function whoDone(id){ return MEMBERS.filter(n=>members[n]&&members[n].done&&members[n].done[id]); }
function allRatings(id){ return MEMBERS.filter(n=>members[n]&&members[n].ratings&&members[n].ratings[id]).map(n=>({n, v:members[n].ratings[id]})); }
function avgRating(id){ const a=allRatings(id); return a.length ? a.reduce((s,x)=>s+x.v,0)/a.length : 0; }
function avatar(name){ return `<span class="av" style="background:${COLORS[name]||'#888'}" title="${name}">${INIT[name]||name[0]}</span>`; }

// ======== Tabs ========
function renderTabs(){
  const t=document.getElementById("tabs");
  let html=`<button class="tab ${activeCat==="alle"?"active":""}" data-c="alle">Alle <small>${countDone("alle")}/${countAll("alle")}</small></button>`;
  for(const c in CATS){
    html+=`<button class="tab ${activeCat===c?"active":""}" data-c="${c}">${CATS[c].emoji} ${CATS[c].label} <small>${countDone(c)}/${countAll(c)}</small></button>`;
  }
  t.innerHTML=html;
  t.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{activeCat=b.dataset.c;render();});
}
const countAll=c=>DATA.filter(d=>c==="alle"||d.cat===c).length;
const countDone=c=>DATA.filter(d=>(c==="alle"||d.cat===c)&&done[d.id]).length;

// ======== Liste ========
let activeCat="alle", filter="alle", query="", view="liste";
function matches(d){
  if(activeCat!=="alle"&&d.cat!==activeCat)return false;
  if(filter==="offen"&&done[d.id])return false;
  if(filter==="done"&&!done[d.id])return false;
  if(query&&!(d.name+" "+d.desc+" "+d.addr).toLowerCase().includes(query))return false;
  return true;
}
function metaHtml(id){
  const who=whoDone(id), avg=avgRating(id);
  if(!who.length && !avg) return "";
  let h=`<div class="meta">`;
  if(who.length) h+=`<span class="who">${who.map(avatar).join("")}</span>`;
  if(avg) h+=`<span class="avg"><b>Ø ${avg.toFixed(1).replace(".",",")}</b> ${"🍷".repeat(Math.round(avg))}</span>`;
  h+=`</div>`;
  return h;
}
function renderMain(){
  const m=document.getElementById("main");
  const cats=activeCat==="alle"?Object.keys(CATS):[activeCat];
  let html="";
  for(const c of cats){
    const items=DATA.filter(d=>d.cat===c&&matches(d));
    if(!items.length)continue;
    html+=`<div class="cat-head"><h2>${CATS[c].emoji} ${CATS[c].label}</h2><span>${countDone(c)} / ${countAll(c)} erledigt</span></div><div class="list">`;
    for(const d of items){
      html+=`<div class="item ${done[d.id]?"done":""}" data-id="${d.id}">
        <div class="check" data-act="toggle">${done[d.id]?"✓":""}</div>
        <div class="item-body"><b>${d.name}</b><span class="d">${d.desc}</span>${metaHtml(d.id)}</div>
        <div class="chev">›</div></div>`;
    }
    html+=`</div>`;
  }
  m.innerHTML=html||`<div class="empty">Nichts gefunden 🤷</div>`;
  m.querySelectorAll(".item").forEach(el=>{
    el.onclick=e=>{
      const id=el.dataset.id;
      if(e.target.dataset.act==="toggle"){ toggle(id); }
      else openSheet(id);
    };
  });
  if(view==="karte"&&map)renderMap();
}
function renderHeader(){
  const a=countAll("alle"),d=countDone("alle");
  document.getElementById("totalbar").style.width=(a?100*d/a:0)+"%";
  document.getElementById("totallabel").textContent=`${d} / ${a}`;
}
function render(){ renderTabs(); renderMain(); renderHeader(); }

function toggle(id){
  if(done[id])delete done[id]; else done[id]=1;
  save(); render();
  const sheet=document.getElementById("sheet");
  if(sheet.classList.contains("open")&&sheet.dataset.id===id){ updateSheetBtn(id); renderPeople(id); }
}

// ======== Detail-Sheet ========
function openSheet(id){
  const d=DATA.find(x=>x.id===id); if(!d)return;
  const q=encodeURIComponent(d.name+", "+(d.addr.includes("Mainz")||/\d{5}/.test(d.addr)?d.addr:d.addr+", Mainz"));
  const sheet=document.getElementById("sheet");
  sheet.dataset.id=id;
  sheet.innerHTML=`
    <div class="grip"></div>
    <span class="badge">${CATS[d.cat].emoji} ${CATS[d.cat].label}</span>
    <h2>${d.name}</h2>
    <p class="desc">${d.desc}</p>
    <p class="addr">📍 ${d.addr}</p>
    <iframe class="map" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
      src="https://maps.google.com/maps?q=${q}&z=15&output=embed"></iframe>
    <div class="rating" id="rating"></div>
    <div class="peoplebox" id="peoplebox"></div>
    <div class="btn-row">
      <button class="btn check-btn" id="sheetcheck"></button>
      <a class="btn maps" target="_blank" rel="noopener"
         href="https://www.google.com/maps/search/?api=1&query=${q}">Google Maps</a>
    </div>`;
  updateSheetBtn(id);
  renderRating(id);
  renderPeople(id);
  document.getElementById("sheetcheck").onclick=()=>toggle(id);
  document.getElementById("backdrop").classList.add("open");
  sheet.classList.add("open");
}
function renderRating(id){
  const el=document.getElementById("rating"); if(!el)return;
  const v=ratings[id]||0;
  let h=`<span class="rlabel">Deine Bewertung:</span>`;
  for(let i=1;i<=5;i++)h+=`<button class="glass ${i<=v?"on":""}" data-v="${i}">🍷</button>`;
  el.innerHTML=h;
  el.querySelectorAll(".glass").forEach(b=>b.onclick=()=>{
    const nv=+b.dataset.v;
    if(ratings[id]===nv)delete ratings[id]; else ratings[id]=nv;
    save(); renderRating(id); renderPeople(id); renderMain();
  });
}
function renderPeople(id){
  const el=document.getElementById("peoplebox"); if(!el)return;
  const who=whoDone(id), ar=allRatings(id), avg=avgRating(id);
  let h=`<h3>Wer war da</h3>`;
  h+= who.length ? `<div class="who" style="margin-bottom:4px">${who.map(avatar).join("")}<span style="margin-left:12px;font-size:13.5px;color:var(--muted)">${who.join(", ")}</span></div>`
                 : `<div class="pnone">Noch niemand abgehakt.</div>`;
  if(ar.length){
    h+=`<h3 style="margin-top:14px">Bewertungen</h3>`;
    ar.forEach(r=>{ h+=`<div class="prow">${avatar(r.n)}<span class="nm">${r.n}</span><span class="gl">${"🍷".repeat(r.v)}</span></div>`; });
    h+=`<div class="pavg">Gruppen-Schnitt: <b>${avg.toFixed(1).replace(".",",")}</b> von 5 🍷</div>`;
  }
  el.innerHTML=h;
}
function updateSheetBtn(id){
  const b=document.getElementById("sheetcheck"); if(!b)return;
  b.classList.toggle("done",!!done[id]);
  b.textContent=done[id]?"✓ Erledigt":"Als erledigt markieren";
}
function closeSheet(){
  document.getElementById("sheet").classList.remove("open");
  document.getElementById("backdrop").classList.remove("open");
}
document.getElementById("backdrop").onclick=closeSheet;

// ======== Kartenansicht ========
let map=null, markerLayer=null, lastFitKey="";
function initMap(){
  if(map||typeof L==="undefined")return;
  map=L.map("map",{zoomControl:true});
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap"}).addTo(map);
  markerLayer=L.layerGroup().addTo(map);
  map.setView([49.9929,8.2473],13);
}
function renderMap(){
  if(!map)return;
  markerLayer.clearLayers();
  const pts=[];
  DATA.filter(matches).forEach(d=>{
    const who=whoDone(d.id);
    const m=L.circleMarker(d.geo,{radius:8,color:"#fff",weight:2,fillColor:done[d.id]?"#2e9e5b":"#b3203c",fillOpacity:.95});
    const av=who.length?who.map(avatar).join("")+"<br>":"";
    m.bindPopup(`<b>${done[d.id]?"✓ ":""}${d.name}</b>${av}<a href="#" onclick="openSheet('${d.id}');return false;">Details ›</a>`);
    m.addTo(markerLayer); pts.push(d.geo);
  });
  const fitKey=activeCat+"|"+filter+"|"+query;
  if(pts.length&&fitKey!==lastFitKey){ map.fitBounds(pts,{padding:[28,28],maxZoom:15}); lastFitKey=fitKey; }
}
document.getElementById("viewseg").querySelectorAll("button").forEach(b=>{
  b.onclick=()=>{
    view=b.dataset.v;
    document.querySelectorAll("#viewseg button").forEach(x=>x.classList.toggle("active",x===b));
    document.body.classList.toggle("mapview",view==="karte");
    if(view==="karte"){ initMap(); setTimeout(()=>{map&&map.invalidateSize();renderMap();},80); }
  };
});

// ======== Suche & Filter ========
document.getElementById("search").oninput=e=>{query=e.target.value.trim().toLowerCase();renderMain();};
document.getElementById("seg").querySelectorAll("button").forEach(b=>{
  b.onclick=()=>{
    filter=b.dataset.f;
    document.querySelectorAll("#seg button").forEach(x=>x.classList.toggle("active",x===b));
    renderMain();
  };
});

// ======== Footer / Profil ========
function updateFooter(){
  const el=document.getElementById("merow"); if(!el)return;
  el.innerHTML=`Angemeldet als <b>${profile}</b> · <button id="switch">Profil wechseln</button>`;
  document.getElementById("switch").onclick=switchProfile;
}
function switchProfile(){
  if(membersRef){ membersRef.off(); membersRef=null; }
  localStorage.removeItem("ag-profile");
  profile=""; done={}; ratings={}; members={};
  showProfilePicker();
}

// ======== Overlays ========
function showProfilePicker(){
  const ov=document.getElementById("overlay");
  ov.innerHTML=`<div class="logo">🍷</div><h2>Wer bist du?</h2>
    <p>Tippe auf deinen Namen. Deine Häkchen und Bewertungen werden verschlüsselt mit der Gruppe geteilt.</p>
    <div class="pgrid">${MEMBERS.map(n=>`<button class="pbtn" data-n="${n}"><span class="bigav" style="background:${COLORS[n]}">${INIT[n]}</span>${n}</button>`).join("")}</div>`;
  ov.classList.add("show");
  ov.querySelectorAll(".pbtn").forEach(b=>b.onclick=()=>{
    profile=b.dataset.n; localStorage.setItem("ag-profile",profile); boot();
  });
}
function showJoinNeeded(){
  const ov=document.getElementById("overlay");
  ov.innerHTML=`<div class="logo">🔒</div><h2>Einladungslink nötig</h2>
    <p>Diese App gehört zur Agraffen-Gruppe. Öffne den Einladungslink, den du per WhatsApp bekommen hast – damit schaltet sich die App frei.</p>`;
  ov.classList.add("show");
}

// ======== Boot ========
async function boot(){
  const ov=document.getElementById("overlay");
  if(!groupCode){ showJoinNeeded(); return; }
  if(!profile){ showProfilePicker(); return; }
  loadLocal();
  ov.classList.remove("show");
  updateFooter();
  render();
  setSync(false,"verbinde…");
  try{
    cryptoKey=await deriveKey(groupCode);
    dbPath=await derivePath(groupCode);
    initFirebase();
  }catch(e){ setSync(false,"offline"); }
}
boot();
</script>
