<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#FFF5EE">
<meta name="apple-mobile-web-app-title" content="Agraffen App">
<title>Agraffen App</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-512.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<style>
:root{
  --bg:#FFF5EE; --card:#ffffff; --text:#2B1720; --muted:#9A7E88;
  --line:#F1E1E7; --line2:#F8EDF1;
  --bordeaux:#D21E5A; --bordeaux-dark:#A81A4C; --bordeaux-soft:#FBE1EC;
  --gold:#C79320; --gold-soft:#FBEFD3; --gold-line:#EED9A0;
  --green:#2FA36B; --red:#C0392B;
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{min-height:100vh;min-height:100dvh}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);padding-bottom:calc(84px + env(safe-area-inset-bottom))}
.appbar{position:sticky;top:0;z-index:20;background:var(--bg);padding:calc(12px + env(safe-area-inset-top)) 18px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:8px;font-size:19px;font-weight:700;color:var(--bordeaux);letter-spacing:.3px}
.brand .g{width:27px;height:27px;border-radius:7px;display:block;flex:0 0 auto}
.agchip{background:var(--gold-soft);color:#7A5A12;font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px;border:1px solid var(--gold-line)}
.appbar-actions{display:flex;align-items:center;gap:8px;flex:0 0 auto}
.abtn{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:var(--card);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;color:var(--text)}
.abtn.prof{border:0;background:none}
.abtn.prof .av{width:36px;height:36px;font-size:13px}
.sheetov{position:fixed;inset:0;background:rgba(30,10,20,.45);z-index:120;display:none}
.sheetov.on{display:block}
.fbsheet{position:absolute;left:50%;bottom:0;transform:translateX(-50%);background:var(--card);width:100%;max-width:520px;max-height:86vh;overflow:auto;border-radius:18px 18px 0 0;padding:16px 18px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -8px 30px rgba(0,0,0,.18)}
.sheet-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.sheet-h h3{font-size:18px;font-weight:700}
.sheet-x{border:0;background:none;font-size:24px;line-height:1;color:var(--muted);cursor:pointer;padding:0 2px}
.fb-hint{color:var(--muted);font-size:13.5px;line-height:1.45;margin-bottom:10px}
#fb-text{width:100%;min-height:96px;border:1px solid var(--line);border-radius:12px;padding:11px 13px;font-size:14.5px;background:var(--card);color:var(--text);outline:none;resize:vertical;font-family:inherit}
.fb-send{margin-top:10px;width:100%;background:var(--bordeaux);color:#fff;border:0;border-radius:12px;padding:12px;font-size:15px;font-weight:700;cursor:pointer}
.fb-ok{display:none;color:var(--green);font-size:13.5px;font-weight:600;margin-top:8px;text-align:center}
.chlog{margin-top:20px;border-top:1px solid var(--line);padding-top:14px}
.chlog-h{font-size:12px;font-weight:700;letter-spacing:.4px;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.chlog-item{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--line2)}
.chlog-v{flex:0 0 auto;font-weight:700;color:var(--bordeaux);font-size:13px;width:42px;font-variant-numeric:tabular-nums}
.chlog-t{font-size:13.5px;color:var(--text);line-height:1.4}
.fb-empty{font-size:13px;color:var(--muted);padding:6px 0}
.fbi{padding:10px 0;border-bottom:1px solid var(--line2)}
.fbi:last-child{border-bottom:0}
.fbi-top{display:flex;align-items:center;gap:7px}
.fbi-top .av{width:22px;height:22px;font-size:10px}
.fbi-by{font-size:13px;font-weight:700;color:var(--text)}
.fbi-d{font-size:11.5px;color:var(--muted)}
.fbi-t{font-size:14px;color:var(--text);line-height:1.4;margin:5px 0 0 29px}
.fbi-st{margin-left:auto;border:0;border-radius:999px;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;white-space:nowrap}
.fbi-st.st-open{background:var(--gold-soft);color:#7A5A12}
.fbi-st.st-wip{background:var(--bordeaux-soft);color:var(--bordeaux-dark)}
.fbi-st.st-done{background:#DFF3E8;color:#1E7A4C}
.sync{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);margin-top:2px}
.sync .dot{width:7px;height:7px;border-radius:50%;background:#7ec9a0}
.sync.off .dot{background:#e6c069}
.screen{display:none}
.screen.active{display:block}
main{padding:12px 14px 24px}
/* Home */
.greet{padding:14px 16px 2px}
.greet h2{font-size:17px;font-weight:700}
.greet p{font-size:13px;color:var(--muted);margin-top:2px}
.hcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 15px;margin:12px 14px 0}
.hcard h3{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:9px;display:flex;align-items:center;gap:7px}
.soon{background:#FAF5EC;border:1px dashed var(--gold-line)}
.badge-soon{display:inline-block;background:var(--gold-soft);color:#7A5A12;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:999px}
.soon p{font-size:13px;color:#8A7A60;line-height:1.45;margin-top:8px}
.soon .ttl{font-size:15px;font-weight:600;color:var(--text)}
.cta{margin:12px 14px 0;width:calc(100% - 28px);background:var(--bordeaux);color:#fff;border:0;border-radius:14px;padding:15px;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:9px;cursor:pointer}
.cta svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.cta:active{transform:scale(.98)}
.cta-sub{text-align:center;font-size:11.5px;color:var(--muted);margin-top:5px}
.rank-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line2)}
.rank-row:last-child{border-bottom:0}
.rank-row .pos{width:18px;font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
.rank-row .nm{flex:1;font-size:14.5px}
.rank-row .ct{font-size:13px;color:var(--bordeaux);font-weight:600}
.av{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;color:#fff;font-size:10px;font-weight:700;flex:0 0 auto}
/* Kasse (Splitwise-Mockup) */
.kasse{margin-top:6px}
.krow{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--line2);font-size:14px}
.krow:last-child{border-bottom:0}
.krow .txt{flex:1}
.krow .amt{font-weight:600;font-variant-numeric:tabular-nums}
.amt.plus{color:var(--green)}
.amt.minus{color:var(--red)}
.kbtn{margin-top:11px;width:100%;background:#fff;border:1.5px solid var(--gold-line);color:#7A5A12;border-radius:12px;padding:11px;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer}
.kbtn svg{width:17px;height:17px;stroke:#7A5A12;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
/* Bucket List */
.tabs{display:flex;gap:8px;overflow-x:auto;padding:12px 14px 4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;border:1px solid var(--line);background:var(--card);border-radius:999px;padding:8px 14px;font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px;cursor:pointer}
.tab small{font-weight:500;color:var(--muted);font-size:12px;font-variant-numeric:tabular-nums}
.tab.active{background:var(--bordeaux);border-color:var(--bordeaux);color:#fff}
.tab.active small{color:rgba(255,255,255,.8)}
.controls{padding:8px 14px 0;display:flex;flex-direction:column;gap:8px}
.search{width:100%;border:1px solid var(--line);border-radius:12px;background:var(--card);padding:10px 14px;font-size:16px;color:var(--text);outline:none}
.search::placeholder{color:var(--muted)}
.seg{display:flex;background:#EFE7D9;border-radius:10px;padding:3px}
.seg button{flex:1;border:0;background:transparent;border-radius:8px;padding:7px 0;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer}
.seg button.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.cat-head{display:flex;align-items:baseline;justify-content:space-between;margin:18px 2px 8px}
.cat-head h2{font-size:16px;font-weight:700}
.cat-head span{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.list{background:var(--card);border-radius:var(--radius);overflow:hidden;border:1px solid var(--line)}
.item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line2);cursor:pointer}
.item:last-child{border-bottom:0}
.check{flex:0 0 26px;height:26px;width:26px;border-radius:50%;border:2px solid #D8CDBB;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;transition:all .15s}
.item.done .check{background:var(--green);border-color:var(--green)}
.item-body{flex:1;min-width:0}
.item-body b{display:block;font-size:15px;font-weight:600;line-height:1.3}
.item-body span.d{display:block;font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.item.done .item-body b{color:var(--muted);text-decoration:line-through}
.chev{color:#D8CDBB;font-size:18px}
.empty{padding:30px 10px;text-align:center;color:var(--muted);font-size:14px}
.meta{display:flex;align-items:center;gap:10px;margin-top:5px;flex-wrap:wrap}
.who{display:inline-flex;align-items:center}
.who .av{width:21px;height:21px;font-size:9.5px;margin-right:-5px;border:1.5px solid var(--card)}
.who .av:last-child{margin-right:0}
.avg{font-size:11px;letter-spacing:.5px;color:var(--muted);white-space:nowrap}
.avg b{color:var(--text);font-weight:600}
#map{display:none;height:calc(100vh - 240px - env(safe-area-inset-top) - env(safe-area-inset-bottom));min-height:340px;margin:10px 14px;border-radius:16px;border:1px solid var(--line);z-index:1}
.leaflet-popup-content{font-family:inherit;font-size:14px}
.leaflet-popup-content b{display:block;margin-bottom:3px}
.leaflet-popup-content a{color:var(--bordeaux);font-weight:700;text-decoration:none}
/* Placeholder screens */
.ph{padding:60px 30px;text-align:center;color:var(--muted)}
.ph .ic{width:46px;height:46px;margin:0 auto;stroke:var(--bordeaux);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;opacity:.85}
.ph h2{font-size:19px;color:var(--text);font-weight:700;margin:14px 0 6px}
.ph p{font-size:14px;line-height:1.5;max-width:300px;margin:0 auto}
.ph .badge-soon{margin-top:14px;font-size:11px;padding:3px 10px}
/* Events */
.ev-head{padding:16px 16px 4px}
.ev-head h2{font-size:20px;font-weight:700}
.ev-head p{font-size:13px;color:var(--muted);margin-top:2px}
#eventswrap{padding:8px 14px 24px}
#ev-filter{display:flex;gap:8px;overflow-x:auto;padding:11px 14px 3px;-webkit-overflow-scrolling:touch}
#ev-filter::-webkit-scrollbar{display:none}
.evfch{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:13px;font-weight:600;padding:7px 13px;border-radius:999px;cursor:pointer;white-space:nowrap}
.evfch.on{background:var(--bordeaux);color:#fff;border-color:var(--bordeaux)}
.ev-day{font-size:13px;font-weight:700;color:var(--bordeaux);margin:16px 2px 8px}
.ev-card{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 13px;margin-bottom:8px;text-decoration:none;color:var(--text);cursor:pointer}
.ev-time{font-size:13px;font-weight:700;color:var(--bordeaux);min-width:44px;font-variant-numeric:tabular-nums}
.ev-body{flex:1;min-width:0}
.ev-body b{display:block;font-size:14.5px;font-weight:600;line-height:1.25}
.ev-body span{display:block;font-size:12px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-cat{font-size:10.5px;color:#7A5A12;background:var(--gold-soft);border:1px solid var(--gold-line);border-radius:999px;padding:2px 7px;white-space:nowrap}
.ev-src{text-align:center;font-size:11px;color:#C3B6A0;padding:16px 0 4px}
.evhome{border-left:3px solid var(--bordeaux)}
.ev-meta{font-size:12.5px;color:var(--muted);margin-top:5px}
/* Trips */
#tripswrap{padding:8px 14px 24px}
.backbtn{border:0;background:none;color:var(--bordeaux);font-size:14px;font-weight:600;cursor:pointer;padding:0}
.trip{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 15px;margin-bottom:12px;cursor:pointer}
.trip.fixed{border-left:3px solid var(--green)}
.trip .th{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.trip .tt{font-size:16px;font-weight:700;line-height:1.2}
.trip .tp{font-size:12.5px;color:var(--muted);margin-top:2px}
.trip-status{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:999px;white-space:nowrap}
.st-vote{background:var(--gold-soft);color:#7A5A12}
.st-fix{background:#E7F4EC;color:#2C6B45}
.tsec{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 14px;margin-bottom:12px}
.tsec-h{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--text)}
.opt{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line2)}
.opt:last-child{border-bottom:0}
.opt.win{background:#F1FAF4;border-radius:10px;padding:8px}
.opt-date{flex:1;font-size:13.5px;min-width:0}
.opt-date a{color:var(--bordeaux);text-decoration:none;font-weight:600;word-break:break-word}
.fixlink{font-size:11.5px;color:var(--bordeaux);cursor:pointer;text-decoration:underline;margin-left:8px;white-space:nowrap}
.opt-cnt{font-size:11.5px;color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:4px}
.opt-btn{border:1.5px solid var(--line);background:#fff;border-radius:9px;width:32px;height:32px;font-size:14px;cursor:pointer;color:var(--muted);flex:0 0 auto}
.opt-btn.on{background:var(--green);border-color:var(--green);color:#fff}
.who-mini{display:inline-flex;align-items:center}
.who-mini .av{width:18px;height:18px;font-size:8.5px;margin-right:-5px;border:1.5px solid var(--card)}
.addrow{display:flex;align-items:center;gap:6px;margin-top:10px}
.addrow input{flex:1;border:1px solid var(--line);border-radius:9px;padding:8px 9px;font-size:13.5px;background:#fff;color:var(--text);outline:none;min-width:0}
.addrow .dts{color:var(--muted);font-size:13px}
.addbtn{flex:0 0 auto;border:1.5px solid var(--gold-line);background:var(--gold-soft);color:#7A5A12;border-radius:9px;width:34px;height:34px;font-size:18px;cursor:pointer;line-height:1}
.pchips{display:flex;flex-wrap:wrap;gap:7px}
.pchip{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:5px 11px 5px 6px;font-size:13px;color:var(--muted);cursor:pointer}
.pchip.on{border-color:var(--bordeaux);color:var(--bordeaux);background:var(--bordeaux-soft)}
.pchip .av{width:20px;height:20px;font-size:9px}
.task{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--line2)}
.task:last-child{border-bottom:0}
.task-t{flex:1;font-size:14px}
.task.done .task-t{color:var(--muted);text-decoration:line-through}
.task-as{flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:999px;padding:4px 9px;font-size:12px;color:var(--bordeaux);cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.task-as .av{width:18px;height:18px;font-size:8.5px}
.itin-day{font-size:12.5px;font-weight:700;color:var(--bordeaux);margin:9px 0 3px}
.itin-row{font-size:13.5px;padding:2px 0 2px 4px}
.pnone{font-size:13px;color:var(--muted)}
.tform{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin:10px 14px 0}
.tform label{display:block;font-size:12px;color:var(--muted);margin:10px 0 5px;font-weight:600}
.tform label:first-child{margin-top:0}
.tform>input{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 11px;font-size:15px;background:#fff;color:var(--text);outline:none}
.tform .dtrow{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.tform .dtrow input{flex:1;border:1px solid var(--line);border-radius:10px;padding:9px 10px;font-size:14px;background:#fff;color:var(--text);outline:none;min-width:0}
.tform .dts{color:var(--muted)}
.linkbtn{border:0;background:none;color:var(--bordeaux);font-size:13px;text-decoration:underline;cursor:pointer;padding:6px 0}
.trip-actions{display:flex;gap:8px;margin-top:4px}
.trip-actions .kbtn{margin-top:0}
.tform .seg{margin-top:0}
.tform.tagmode .dt-e,.tform.tagmode .dts{display:none}
.tform .tagonly,.tform .mehronly{font-weight:400}
.tform.tagmode .mehronly{display:none}
.tform:not(.tagmode) .tagonly{display:none}
.task-as-sel{flex:0 0 auto;border:1px solid var(--line);border-radius:999px;padding:4px 8px;font-size:12px;color:var(--bordeaux);background:#fff;max-width:120px}
/* Chat */
#chatmsgs{padding:12px 12px 44px;min-height:62vh}
.chat-day{text-align:center;font-size:11.5px;color:var(--muted);margin:14px 0 10px}
.grp{display:flex;flex-direction:column;align-items:flex-start;margin-bottom:11px}
.grp.mine{align-items:flex-end}
.grp-h{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);margin-bottom:3px;padding:0 4px}
.grp-av{display:inline-flex}
.grp-av .av{width:18px;height:18px;font-size:8.5px}
.grp-name{font-weight:700}
.grp-time{font-variant-numeric:tabular-nums}
.bubble{max-width:80%;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:7px 11px;margin-bottom:3px}
.grp .bubble:last-child{margin-bottom:0}
.grp.mine .bubble{background:var(--bordeaux);border-color:var(--bordeaux);color:#fff}
.msg-text{font-size:14.5px;line-height:1.35;white-space:pre-wrap;word-break:break-word}
.chat-input{position:fixed;left:0;right:0;bottom:calc(56px + env(safe-area-inset-bottom));z-index:25;background:var(--bg);border-top:1px solid var(--line);padding:8px 12px;display:flex;gap:8px;align-items:center}
.chat-input input{flex:1;border:1px solid var(--line);border-radius:999px;padding:9px 14px;font-size:15px;background:var(--card);color:var(--text);outline:none}
.ci-normal{display:flex;gap:8px;align-items:center;flex:1}
.ci-normal input{flex:1;border:1px solid var(--line);border-radius:999px;padding:9px 14px;font-size:15px;background:var(--card);color:var(--text);outline:none;min-width:0}
#chat-send,#chat-mic{flex:0 0 auto;width:40px;height:40px;border:0;border-radius:50%;font-size:17px;cursor:pointer}
#chat-send{background:var(--bordeaux);color:#fff}
#chat-mic{background:var(--gold-soft);color:#7A5A12}

// ======== Verschlüsselung ========
const APP_SALT = "agraffen-mainz-bucketlist-v2";
const te = new TextEncoder(), td = new TextDecoder();
const b64  = arr => btoa(String.fromCharCode.apply(null, arr));
const ub64 = s => Uint8Array.from(atob(s), c=>c.charCodeAt(0));
async function deriveKey(code){
  const base = await crypto.subtle.importKey("raw", te.encode(code), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:te.encode(APP_SALT), iterations:150000, hash:"SHA-256"},
    base, {name:"AES-GCM", length:256}, false, ["encrypt","decrypt"]);
}
async function derivePath(code){
  const buf = await crypto.subtle.digest("SHA-256", te.encode(APP_SALT+"|path|"+code));
  return "g"+[...new Uint8Array(buf)].slice(0,16).map(b=>b.toString(16).padStart(2,"0")).join("");
}
async function encryptObj(key,obj){
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, te.encode(JSON.stringify(obj)));
  return {iv:b64(iv), ct:b64(new Uint8Array(ct))};
}
async function decryptObj(key,blob){
  try{
    const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:ub64(blob.iv)}, key, ub64(blob.ct));
    return JSON.parse(td.decode(pt));
  }catch(e){ return null; }
}

let done={}, ratings={}, meUpdated=0;
let members={};
let cryptoKey=null, dbPath="", membersRef=null;
let activeCat="alle", filter="alle", query="", screen="home", view="liste";

function loadLocal(){
  try{ const o=JSON.parse(localStorage.getItem("ag-data-"+profile)||"{}"); done=o.done||{}; ratings=o.ratings||{}; meUpdated=o.updated||0; }
  catch(e){ done={}; ratings={}; meUpdated=0; }
  members[profile]={done:{...done}, ratings:{...ratings}};
}
function save(){
  meUpdated=Date.now();
  try{ localStorage.setItem("ag-data-"+profile, JSON.stringify({done,ratings,updated:meUpdated})); }catch(e){}
  members[profile]={done:{...done}, ratings:{...ratings}};
  pushMine();
}

// ======== Firebase-Sync ========
function setSync(on,txt){
  const el=document.getElementById("sync"); if(!el)return;
  el.classList.toggle("off",!on);
  document.getElementById("synctxt").textContent=txt;
}
function sameMap(a,b){const ka=Object.keys(a),kb=Object.keys(b);if(ka.length!==kb.length)return false;return ka.every(k=>a[k]===b[k]);}
function initFirebase(){
  try{ if(!firebase.apps.length) firebase.initializeApp(firebaseConfig); }
  catch(e){ setSync(false,"offline"); return; }
  const db=firebase.database();
  try{ storage=firebase.storage(); }catch(e){ storage=null; }
  membersRef=db.ref("groups/"+dbPath+"/members");
  membersRef.on("value", async snap=>{
    const val=snap.val()||{};
    const next={};
    let pushNeeded=false;
    for(const name in val){
      const dec=await decryptObj(cryptoKey, val[name]);
      if(!dec) continue;
      if(name===profile){
        const ru=dec.updated||0;
        if(ru>meUpdated){
          done=dec.done||{}; ratings=dec.ratings||{}; meUpdated=ru;
          try{ localStorage.setItem("ag-data-"+profile, JSON.stringify({done,ratings,updated:meUpdated})); }catch(e){}
        } else if(meUpdated>ru){
          pushNeeded=true;
        }
        next[profile]={done:{...done}, ratings:{...ratings}};
      } else {
        next[name]={done:dec.done||{}, ratings:dec.ratings||{}};
      }
    }
    if(!next[profile]){
      next[profile]={done:{...done}, ratings:{...ratings}};
      if(meUpdated>0) pushNeeded=true;
    }
    members=next;
    setSync(true, MEMBERS.filter(n=>members[n]).length+" Profile · synchron");
    render();
    if(pushNeeded) pushMine();
  }, err=>{ setSync(false,"offline"); });
  subscribeTrips(db);
  subscribeSpots(db);
  subscribeChat(db);
  subscribeComments(db);
  subscribeKasse(db);
  subscribeEventsRsvp(db);
  subscribeUserEvents(db);
  subscribeNotif(db);
  subscribeFeedback(db);
}
let pushT=null;
function pushMine(){
  if(!membersRef||!cryptoKey) return;
  clearTimeout(pushT);
  pushT=setTimeout(async()=>{
    try{ const blob=await encryptObj(cryptoKey,{done,ratings,updated:meUpdated}); membersRef.child(profile).set(blob); }catch(e){}
  },400);
}

// ======== Aggregation ========
function whoDone(id){ return MEMBERS.filter(n=>members[n]&&members[n].done&&members[n].done[id]); }
function allRatings(id){ return MEMBERS.filter(n=>members[n]&&members[n].ratings&&members[n].ratings[id]).map(n=>({n, v:members[n].ratings[id]})); }
function avgRating(id){ const a=allRatings(id); return a.length ? a.reduce((s,x)=>s+x.v,0)/a.length : 0; }
function avatar(name){ return `<span class="av" style="background:${COLORS[name]||'#888'}" title="${name}">${INIT[name]||name[0]}</span>`; }
function doneCountOf(name){ return members[name]&&members[name].done ? Object.keys(members[name].done).length : 0; }
function agraffenCount(){
  const c={};
  MEMBERS.forEach(n=>{ const d=members[n]&&members[n].done||{}; for(const id in d){ c[id]=(c[id]||0)+1; } });
  return Object.values(c).filter(x=>x>=2).length;
}

// ======== Chat ========
let chatMsgs=[], chatRef=null, lastSeenChat=0, storage=null;
const MEDIA_MAX = 100*1024*1024;      // 100 MB Obergrenze (v.a. Videos)
const MEDIA_TTL = 90*24*60*60*1000;   // 90 Tage
const mediaCache={};                  // _id -> objectURL (entschlüsselt)
const prunedSet=new Set();            // schon aufgeräumte Medien (Doppel-Löschen vermeiden)
function pruneMedia(m){
  if(!m||!m._id||prunedSet.has(m._id)) return; prunedSet.add(m._id);
  try{ if(storage&&m.path) storage.ref(m.path).delete().catch(()=>{}); }catch(e){}
  if(chatRef) chatRef.child(m._id).remove().catch(()=>{});
}
function esc(s){ return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
async function encryptBytes(key,buf){
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, buf);
  return { iv:b64(iv), blob:new Blob([ct]) };
}
async function decryptBytes(key,buf,ivB64){
  return crypto.subtle.decrypt({name:"AES-GCM", iv:ub64(ivB64)}, key, buf);
}
function upStat(txt){ const e=document.getElementById("chat-upstat"); if(!e)return; if(txt==null){e.style.display="none";return;} e.textContent=txt; e.style.display="block"; }
function subscribeChat(db){
  lastSeenChat=+(localStorage.getItem("ag-chatseen-"+profile)||0);
  chatRef=db.ref("groups/"+dbPath+"/chat");
  chatRef.on("value", async snap=>{
    const v=snap.val()||{}; const arr=[];
    for(const id in v){ const d=await decryptObj(cryptoKey,v[id]); if(d){ d._id=id; arr.push(d); } }
    arr.sort((a,b)=>(a.ts||0)-(b.ts||0));
    // Medien älter als 90 Tage automatisch aufräumen (Datei + Eintrag); Texte bleiben
    const cut=Date.now()-MEDIA_TTL;
    const keep=[];
    arr.forEach(m=>{ if((m.type==="image"||m.type==="video"||m.type==="voice") && m.path && (m.ts||0)<cut){ pruneMedia(m); } else { keep.push(m); } });
    chatMsgs=keep;
    if(screen==="chat"){ renderChat(); markChatSeen(); }
    updateChatDot();
  });
}
function unreadChat(){ return chatMsgs.filter(m=>(m.ts||0)>lastSeenChat && m.sender!==profile).length; }
function updateChatDot(){ const d=document.getElementById("chatdot"); if(d) d.style.display=unreadChat()>0?"block":"none"; }
function markChatSeen(){ if(chatMsgs.length){ lastSeenChat=chatMsgs[chatMsgs.length-1].ts||Date.now(); try{localStorage.setItem("ag-chatseen-"+profile,String(lastSeenChat));}catch(e){} } updateChatDot(); }
async function sendChat(text){ if(!chatRef||!cryptoKey)return; text=(text||"").trim(); if(!text)return; const id="m"+Date.now()+Math.random().toString(36).slice(2,5); try{ chatRef.child(id).set(await encryptObj(cryptoKey,{sender:profile,text,ts:Date.now()})); }catch(e){} pushSignal("chat"); }
async function deleteMsg(id){ if(!chatRef)return; try{ await chatRef.child(id).remove(); }catch(e){} }
function bindLongPress(el,id){
  let t=null;
  const start=e=>{ if(e.target&&e.target.closest&&e.target.closest(".vplay"))return; t=setTimeout(()=>{ t=null; if(confirm("Diese Nachricht löschen?")) deleteMsg(id); },550); };
  const cancel=()=>{ if(t){clearTimeout(t);t=null;} };
  el.addEventListener("pointerdown",start); el.addEventListener("pointerup",cancel); el.addEventListener("pointerleave",cancel); el.addEventListener("pointermove",cancel);
}
function renderChat(){
  const el=document.getElementById("chatmsgs"); if(!el)return;
  if(!chatMsgs.length){ el.innerHTML=`<div class="empty" style="padding-top:50px">Noch keine Nachrichten.<br>Schreib der Gruppe etwas!</div>`; return; }
  let h="", lastDay="", curSender=null, curTs=0, open=false;
  chatMsgs.forEach((m,i)=>{
    const dt=new Date(m.ts||0);
    const day=dt.toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"});
    const mine=m.sender===profile;
    const time=dt.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});
    const gap=(m.ts||0)-curTs>600000;
    if(day!==lastDay){ if(open){h+="</div>";open=false;} h+=`<div class="chat-day">${day}</div>`; lastDay=day; }
    if(!open || m.sender!==curSender || gap){
      if(open) h+="</div>";
      h+=`<div class="grp ${mine?'mine':''}"><div class="grp-h">${mine?'':`<span class="grp-av">${avatar(m.sender)}</span><span class="grp-name" style="color:${COLORS[m.sender]||'#888'}">${esc(m.sender)}</span>`}<span class="grp-time">${time}</span></div>`;
      open=true; curSender=m.sender;
    }
    curTs=m.ts||0;
    if(m.type==="voice"){
      const dur=m.dur||0; const dl=Math.floor(dur/60)+":"+String(dur%60).padStart(2,"0");
      h+=`<div class="bubble voice"${mine?` data-del="${m._id}"`:""}><button class="vplay" data-vidx="${i}">▶</button><span class="vwave">🎙️ Sprachnachricht</span><span class="vdur">${dl}</span></div>`;
    } else if(m.type==="image"){
      h+=`<div class="bubble media"${mine?` data-del="${m._id}"`:""}><img class="chatimg ph" data-mimg="${i}" alt="Bild"></div>`;
    } else if(m.type==="video"){
      h+=`<div class="bubble media"${mine?` data-del="${m._id}"`:""}><div class="chatvid" data-mvid="${i}"><span class="vic">▶</span> Video</div></div>`;
    } else {
      h+=`<div class="bubble"${mine?` data-del="${m._id}"`:""}><div class="msg-text">${esc(m.text)}</div></div>`;
    }
  });
  if(open) h+="</div>";
  el.innerHTML=h;
  el.querySelectorAll(".vplay").forEach(b=>b.onclick=()=>playVoice(+b.dataset.vidx,b));
  el.querySelectorAll(".chatimg[data-mimg]").forEach(im=>{ const m=chatMsgs[+im.dataset.mimg]; if(m){ fillImage(im,m); im.onclick=()=>openMediaOverlay(m); } });
  el.querySelectorAll(".chatvid[data-mvid]").forEach(v=>{ const m=chatMsgs[+v.dataset.mvid]; if(m) v.onclick=()=>openMediaOverlay(m); });
  el.querySelectorAll("[data-del]").forEach(b=>bindLongPress(b,b.dataset.del));
  window.scrollTo(0,document.body.scrollHeight);
}
// ---- Sprachnachrichten ----
let mediaRec=null, recChunks=[], recMime="", recStart=0, recTimer=null, curAudio=null, curBtn=null;
function abToB64(buf){ const b=new Uint8Array(buf); let s=""; const c=0x8000; for(let i=0;i<b.length;i+=c){ s+=String.fromCharCode.apply(null,b.subarray(i,i+c)); } return btoa(s); }
async function sendVoice(b64,mime,dur){ if(!chatRef||!cryptoKey)return; const id="m"+Date.now()+Math.random().toString(36).slice(2,5); try{ chatRef.child(id).set(await encryptObj(cryptoKey,{sender:profile,ts:Date.now(),type:"voice",audio:b64,mime,dur})); }catch(e){} }
function recUI(on){ const n=document.getElementById("ci-normal"), r=document.getElementById("ci-rec"); if(n)n.style.display=on?"none":"flex"; if(r)r.style.display=on?"flex":"none"; if(!on){const t=document.getElementById("rec-time"); if(t)t.textContent="0:00";} }
async function startRec(){
  if(!navigator.mediaDevices||!window.MediaRecorder){ alert("Sprachnachrichten werden hier leider nicht unterstützt."); return; }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    let opts={}; try{ if(MediaRecorder.isTypeSupported("audio/mp4")) opts={mimeType:"audio/mp4"}; else if(MediaRecorder.isTypeSupported("audio/webm")) opts={mimeType:"audio/webm"}; }catch(e){}
    mediaRec=new MediaRecorder(stream,opts); recChunks=[]; recMime=mediaRec.mimeType||"audio/mp4";
    mediaRec.ondataavailable=e=>{ if(e.data&&e.data.size) recChunks.push(e.data); };
    mediaRec.start(); recStart=Date.now(); recUI(true);
    recTimer=setInterval(()=>{ const s=Math.floor((Date.now()-recStart)/1000); const t=document.getElementById("rec-time"); if(t)t.textContent=Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); if(s>=120) finishRec(true); },250);
  }catch(e){ alert("Kein Zugriff aufs Mikrofon (Berechtigung?)."); }
}
function stopTracks(){ try{ if(mediaRec&&mediaRec.stream) mediaRec.stream.getTracks().forEach(t=>t.stop()); }catch(e){} }
function cancelRec(){ clearInterval(recTimer); if(mediaRec&&mediaRec.state!=="inactive"){ mediaRec.onstop=stopTracks; try{mediaRec.stop();}catch(e){} } recChunks=[]; recUI(false); }
function finishRec(send){
  clearInterval(recTimer);
  if(!mediaRec||mediaRec.state==="inactive"){ recUI(false); return; }
  const dur=Math.max(1,Math.round((Date.now()-recStart)/1000));
  mediaRec.onstop=async()=>{ stopTracks(); if(send&&recChunks.length){ const blob=new Blob(recChunks,{type:recMime}); uploadMedia("voice",recMime,blob,{dur}); } recChunks=[]; };
  try{ mediaRec.stop(); }catch(e){}
  recUI(false);
}
async function playVoice(idx,btn){
  const m=chatMsgs[idx]; if(!m)return;
  if(curAudio){ try{curAudio.pause();}catch(e){} if(curBtn)curBtn.textContent="▶"; const same=curBtn===btn; curAudio=null; curBtn=null; if(same) return; }
  let url=null;
  try{
    if(m.path){ btn.textContent="…"; url=await loadMedia(m); }
    else if(m.audio){ url=URL.createObjectURL(new Blob([ub64(m.audio)],{type:m.mime||"audio/mp4"})); }
  }catch(e){ btn.textContent="▶"; alert("Sprachnachricht abgelaufen oder nicht verfügbar."); return; }
  if(!url){ btn.textContent="▶"; return; }
  try{
    const a=new Audio(url); curAudio=a; curBtn=btn; btn.textContent="⏸";
    a.onended=()=>{ btn.textContent="▶"; curAudio=null; curBtn=null; };
    a.play().catch(()=>{ btn.textContent="▶"; curAudio=null; curBtn=null; });
  }catch(e){ btn.textContent="▶"; }
}
// ---- Bilder / Videos ----
async function uploadMedia(kind,mime,blobData,extra){
  // Datei liegt im geheimen Storage-Pfad; der Nachrichten-Rahmen bleibt verschlüsselt
  if(!chatRef||!cryptoKey||!storage){ alert("Speicher nicht bereit."); return; }
  const id="m"+Date.now()+Math.random().toString(36).slice(2,5);
  const blob = blobData instanceof Blob ? blobData : new Blob([blobData],{type:mime||"application/octet-stream"});
  upStat("Wird gesendet… 0%");
  try{
    const path = "groups/"+dbPath+"/media/"+id;
    const task = storage.ref(path).put(blob, {contentType:mime||"application/octet-stream"});
    task.on("state_changed", s=>{ const p=s.totalBytes?Math.round(100*s.bytesTransferred/s.totalBytes):0; upStat("Wird gesendet… "+p+"%"); });
    await task;
    const meta = Object.assign({sender:profile, ts:Date.now(), type:kind, path, mime:mime||"application/octet-stream", size:blob.size}, extra||{});
    await chatRef.child(id).set(await encryptObj(cryptoKey, meta));
    upStat(null);
    pushSignal("chat");
  }catch(e){ upStat(null); alert("Senden fehlgeschlagen. Bitte nochmal versuchen."); }
}
async function sendMediaFile(file){
  if(!file) return;
  const isImg=(file.type||"").startsWith("image/"), isVid=(file.type||"").startsWith("video/");
  if(!isImg && !isVid){ alert("Bitte ein Bild oder Video auswählen."); return; }
  if(isVid && file.size>MEDIA_MAX){ alert("Das Video ist zu groß (max. 100 MB). Bitte einen kürzeren Clip senden."); return; }
  if(file.size>MEDIA_MAX){ alert("Datei zu groß (max. 100 MB)."); return; }
  await uploadMedia(isImg?"image":"video", file.type||(isImg?"image/jpeg":"video/mp4"), file, {name:file.name||""});
}
async function loadMedia(m){
  if(mediaCache[m._id]) return mediaCache[m._id];
  const url = await storage.ref(m.path).getDownloadURL();   // wirft, wenn abgelaufen/gelöscht
  mediaCache[m._id]=url;
  return url;
}
function fillImage(imgEl,m){
  loadMedia(m).then(u=>{ imgEl.src=u; imgEl.classList.remove("ph"); })
    .catch(()=>{ const b=imgEl.closest(".bubble"); if(b) b.innerHTML='<div class="media-exp">📷 Bild abgelaufen (90 Tage)</div>'; });
}
function openMediaOverlay(m){
  const ov=document.getElementById("mediaov"), body=document.getElementById("media-body"); if(!ov||!body)return;
  body.innerHTML='<div style="color:#fff;font-size:14px">Lädt…</div>'; ov.classList.add("on");
  loadMedia(m).then(u=>{
    if(m.type==="video"){ body.innerHTML=`<video src="${u}" controls autoplay playsinline></video>`; }
    else { body.innerHTML=`<img src="${u}" alt="Bild">`; }
  }).catch(()=>{ body.innerHTML='<div style="color:#fff;font-size:15px">Diese Medien sind abgelaufen (90 Tage) und wurden gelöscht.</div>'; });
}
function closeMediaOverlay(){ const ov=document.getElementById("mediaov"), body=document.getElementById("media-body"); if(ov)ov.classList.remove("on"); if(body)body.innerHTML=""; }

// ======== Trips ========
let trips={}, tripVotes={}, tripsRef=null, votesRef=null, openTripId=null;
function subscribeTrips(db){
  tripsRef=db.ref("groups/"+dbPath+"/trips");
  tripsRef.on("value", async snap=>{ const v=snap.val()||{}; const nx={}; for(const id in v){ const d=await decryptObj(cryptoKey,v[id]); if(d) nx[id]=d; } trips=nx; if(openTripId&&!trips[openTripId])openTripId=null; if(screen==="trips")renderTrips(); if(screen==="home")renderHome(); });
  votesRef=db.ref("groups/"+dbPath+"/tripVotes");
  votesRef.on("value", async snap=>{ const v=snap.val()||{}; const nx={}; for(const id in v){ nx[id]={}; for(const nm in v[id]){ const d=await decryptObj(cryptoKey,v[id][nm]); if(d) nx[id][nm]=d; } } tripVotes=nx; if(screen==="trips")renderTrips(); if(screen==="home")renderHome(); });
}
function tParts(t){ return (t.participants&&t.participants.length)?t.participants:MEMBERS; }
function isMulti(t){ return t.type!=="tag"; }
function dFmt(s){ try{return new Date(s+"T12:00").toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"short"});}catch(e){return s;} }
function rangeFmt(o){ if(o.end&&o.end!==o.start) return dFmt(o.start)+" – "+dFmt(o.end); return dFmt(o.start); }
function myV(tid){ const v=(tripVotes[tid]&&tripVotes[tid][profile])||{}; return {dates:v.dates||{},stays:v.stays||{},transport:v.transport||{}}; }
function votersFor(tid,kind,oid){ const t=trips[tid]; const ps=t?tParts(t):MEMBERS; return ps.filter(n=>{const v=tripVotes[tid]&&tripVotes[tid][n]; return v&&v[kind]&&v[kind][oid];}); }
function isCreator(t){ return t.creator===profile; }
function fixedDateObj(t){ return t.fixedDate?(t.dates||[]).find(d=>d.id===t.fixedDate):null; }
async function writeTrip(tid){ try{ tripsRef.child(tid).set(await encryptObj(cryptoKey,trips[tid])); }catch(e){} }
async function createTrip(title,parts,ranges,type){
  if(!tripsRef||!cryptoKey)return;
  const id="t"+Date.now()+Math.random().toString(36).slice(2,5);
  trips[id]={title,creator:profile,created:Date.now(),type:type||"tag",participants:parts,
    dates:ranges.map((r,i)=>({id:"d"+i,start:r.start,end:r.end||""})),fixedDate:null,
    stays:[],fixedStay:null,
    transport:[{id:"tA",label:"Zug"},{id:"tB",label:"Flug"},{id:"tC",label:"Auto"}],fixedTransport:null,
    tasks:[],itinerary:[]};
  await writeTrip(id); openTripId=id; if(screen==="trips")renderTrips(); pushSignal("invite");
}
async function toggleVote(tid,kind,oid){
  if(!votesRef||!cryptoKey)return;
  const cur=myV(tid); cur[kind]=Object.assign({},cur[kind]); cur[kind][oid]=!cur[kind][oid];
  try{ votesRef.child(tid).child(profile).set(await encryptObj(cryptoKey,cur)); }catch(e){}
}
async function addDate(tid,start,end){ const t=trips[tid]; if(!t)return; t.dates.push({id:"d"+Date.now().toString(36),start,end:end||""}); await writeTrip(tid); }
async function addStay(tid,label,url){ const t=trips[tid]; if(!t)return; t.stays.push({id:"s"+Date.now().toString(36),label,url:url||"",by:profile}); await writeTrip(tid); }
async function addTransport(tid,label){ const t=trips[tid]; if(!t)return; t.transport.push({id:"x"+Date.now().toString(36),label}); await writeTrip(tid); }
async function addTask(tid,text){ const t=trips[tid]; if(!t)return; t.tasks.push({id:"k"+Date.now().toString(36),text,assignee:null,done:false,by:profile}); await writeTrip(tid); pushSignal("task"); }
async function claimTask(tid,kid){ const t=trips[tid]; if(!t)return; const k=t.tasks.find(x=>x.id===kid); if(!k)return; k.assignee=(k.assignee===profile)?null:profile; await writeTrip(tid); }
async function assignTask(tid,kid,name){ const t=trips[tid]; if(!t)return; const k=(t.tasks||[]).find(x=>x.id===kid); if(!k)return; k.assignee=name||null; await writeTrip(tid); }
async function renameTrip(tid,title){ const t=trips[tid]; if(!t||!isCreator(t))return; t.title=title; await writeTrip(tid); }
async function toggleTaskDone(tid,kid){ const t=trips[tid]; if(!t)return; const k=t.tasks.find(x=>x.id===kid); if(!k)return; k.done=!k.done; await writeTrip(tid); }
async function addItin(tid,day,text){ const t=trips[tid]; if(!t)return; t.itinerary.push({id:"i"+Date.now().toString(36),day:day||"",text}); await writeTrip(tid); }
async function fixField(tid,field,oid){ const t=trips[tid]; if(!t||!isCreator(t))return; t[field]=(t[field]===oid)?null:oid; await writeTrip(tid); }
async function setParticipants(tid,parts){ const t=trips[tid]; if(!t||!isCreator(t))return; t.participants=parts.length?parts:[t.creator]; await writeTrip(tid); }
async function deleteTrip(tid){ const t=trips[tid]; if(!t||!isCreator(t))return; if(!confirm("Diesen Trip wirklich löschen?"))return; openTripId=null; try{ await tripsRef.child(tid).remove(); await votesRef.child(tid).remove(); }catch(e){} if(screen==="trips")renderTrips(); }
function nextTrip(){
  const cut=new Date(); cut.setHours(0,0,0,0); const cutMs=cut.getTime()-864e5;
  const arr=Object.keys(trips).map(id=>{const t=trips[id];const fd=fixedDateObj(t);return fd?{id,t,start:fd.start,fd}:null;}).filter(x=>x&&new Date(x.start+"T12:00").getTime()>=cutMs).sort((a,b)=>a.start.localeCompare(b.start));
  return arr[0]||null;
}
function openVotes(){
  const out=[];
  Object.keys(trips).forEach(tid=>{
    const t=trips[tid]; if(!t) return;
    const ps=tParts(t); if(!ps.includes(profile)) return;
    const multi=isMulti(t);
    const cats=[];
    if(!t.fixedDate && (t.dates||[]).length>0) cats.push({kind:"dates",label:"Termin",icon:"📅"});
    if(multi && !t.fixedStay && (t.stays||[]).length>0) cats.push({kind:"stays",label:"Unterkunft",icon:"🏠"});
    if(multi && !t.fixedTransport && (t.transport||[]).length>0) cats.push({kind:"transport",label:"Anreise",icon:"🚆"});
    cats.forEach(c=>{
      const mineVoted = Object.values((myV(tid)[c.kind])||{}).some(Boolean);
      const voted = ps.filter(n=>{ const v=tripVotes[tid]&&tripVotes[tid][n]; return v&&v[c.kind]&&Object.values(v[c.kind]).some(Boolean); }).length;
      out.push({tid, title:t.title||"Trip", kind:c.kind, label:c.label, icon:c.icon, mineVoted, voted, total:ps.length});
    });
  });
  out.sort((a,b)=>(a.mineVoted?1:0)-(b.mineVoted?1:0));
  return out;
}
function pad2(n){return String(n).padStart(2,"0");}
function dStamp(s){const d=new Date(s+"T00:00");return d.getFullYear()+pad2(d.getMonth()+1)+pad2(d.getDate());}
function tripICS(t){
  const fd=fixedDateObj(t); if(!fd)return;
  const endD=new Date((fd.end||fd.start)+"T00:00"); endD.setDate(endD.getDate()+1);
  const dtend=endD.getFullYear()+pad2(endD.getMonth()+1)+pad2(endD.getDate());
  const stay=t.fixedStay?((t.stays||[]).find(s=>s.id===t.fixedStay)||{}).label:"";
  const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Agraffen//Trips//DE","BEGIN:VEVENT","UID:"+Date.now()+"@agraffen","DTSTAMP:"+dStamp(new Date().toISOString().slice(0,10))+"T000000Z","DTSTART;VALUE=DATE:"+dStamp(fd.start),"DTEND;VALUE=DATE:"+dtend,"SUMMARY:"+(t.title||"Agraffen-Trip")];
  if(stay)lines.push("LOCATION:"+stay);
  lines.push("END:VEVENT","END:VCALENDAR");
  const uri="data:text/calendar;charset=utf-8,"+encodeURIComponent(lines.join("\r\n"));
  const a=document.createElement("a"); a.href=uri; a.download=(t.title||"trip").replace(/[^a-z0-9]+/gi,"-")+".ics"; document.body.appendChild(a); a.click(); a.remove();
}
function openTrip(id){ openTripId=id; renderTrips(); window.scrollTo(0,0); }
function closeTrip(){ openTripId=null; renderTrips(); window.scrollTo(0,0); }
function openTripForm(){
  const f=document.getElementById("newtripform");

function handleTripAction(id,act,oid){

function upcomingTrips(){
  const cut=new Date(); cut.setHours(0,0,0,0); const cutMs=cut.getTime();
  const arr=[];
  Object.keys(trips).forEach(id=>{
    const t=trips[id]; const fd=fixedDateObj(t);
    if(fd){
      const endMs=new Date((fd.end||fd.start)+"T12:00").getTime();
      if(endMs>=cutMs){ const startMs=new Date(fd.start+"T12:00").getTime(); arr.push({id,t,fd,start:fd.start,planning:false,running:startMs<=cutMs}); }
    } else {
      arr.push({id,t,fd:null,start:(t.dates&&t.dates[0]&&t.dates[0].start)||"9999-99-99",planning:true,running:false});
    }
  });
  arr.sort((a,b)=>String(a.start).localeCompare(String(b.start)));
  return arr;
}

async function saveUserEvent(obj, editId){
  if(!userEventsRef||!cryptoKey){ alert("Keine Verbindung – Event kann gerade nicht gespeichert werden."); return null; }
  const ex=editId?userEvents[editId]:null;
  const id=editId || ("ue"+Date.now().toString(36)+Math.random().toString(36).slice(2,5));
  const rec={ name:obj.name, start:obj.start, venue:obj.venue||"", city:obj.city||"", cat:obj.cat||"Eigenes Event", desc:obj.desc||"", by: ex?ex.by:profile, ts: ex?ex.ts:Date.now() };
  userEvents[id]={ ...rec, _uid:id, custom:true }; if(screen==="events")renderEvents();
  try{ await userEventsRef.child(id).set(await encryptObj(cryptoKey,rec)); }catch(e){}
  if(!editId && eventsRsvpRef){
    const eid=evId(rec);
    if(!eventRsvp[eid]) eventRsvp[eid]={info:null,asked:null,votes:{}};
    eventRsvp[eid].info={name:rec.name,start:rec.start,venue:rec.venue,city:rec.city,cat:rec.cat,by:profile,ts:Date.now()};
    eventRsvp[eid].votes[profile]=true;
    try{ await eventsRsvpRef.child(eid).child("info").set(await encryptObj(cryptoKey,eventRsvp[eid].info)); }catch(e){}

let eventsRsvpRef=null, eventRsvp={};
function evId(e){ return (slug(e.name||"").replace(/-/g,"").slice(0,28)||"ev")+"_"+String(e.start||"").replace(/[^0-9]/g,"").slice(0,8); }
function subscribeEventsRsvp(db){
  eventsRsvpRef=db.ref("groups/"+dbPath+"/events_rsvp");
  eventsRsvpRef.on("value", async snap=>{
    const val=snap.val()||{}; const nx={};
    for(const eid in val){
      const node=val[eid]||{};
      const info=node.info?await decryptObj(cryptoKey,node.info):null;
      const asked=node.asked?await decryptObj(cryptoKey,node.asked):null;
      const votes={};
      if(node.v){ for(const nm in node.v){ const d=await decryptObj(cryptoKey,node.v[nm]); if(d) votes[nm]=(d.in===true); } }
      nx[eid]={info, asked, votes};
    }
    eventRsvp=nx;
    if(screen==="home") renderHome();
    if(screen==="events") renderEvents();
    const sh=document.getElementById("sheet");
    if(sh.classList.contains("open") && (sh.dataset.id||"").startsWith("ev:")){ const inf=evByEid(sh.dataset.id.slice(3)); if(inf) openEventSheet(inf); }
  }, err=>{});
}
async function ensureEventInfo(eid, ev){
  if(!eventRsvp[eid]) eventRsvp[eid]={info:null,asked:null,votes:{}};
  if(!eventRsvp[eid].info){
    eventRsvp[eid].info={name:ev.name,start:ev.start,venue:ev.venue||"",city:ev.city||"",cat:ev.cat||"",by:profile,ts:Date.now()};
    try{ await eventsRsvpRef.child(eid).child("info").set(await encryptObj(cryptoKey,eventRsvp[eid].info)); }catch(e){}
  }
}
async function setEventVote(ev, val){
  if(!eventsRsvpRef||!cryptoKey){ alert("Keine Verbindung – bitte kurz später erneut."); return; }
  const eid=evId(ev);
  await ensureEventInfo(eid, ev);
  const cur = (profile in eventRsvp[eid].votes) ? eventRsvp[eid].votes[profile] : null;
  if(cur===val){
    delete eventRsvp[eid].votes[profile];
    try{ await eventsRsvpRef.child(eid).child("v").child(profile).remove(); }catch(e){}
  } else {
    eventRsvp[eid].votes[profile]=val;
    try{ await eventsRsvpRef.child(eid).child("v").child(profile).set(await encryptObj(cryptoKey,{in:val,ts:Date.now()})); }catch(e){}
  }
  openEventSheet(eventRsvp[eid].info||ev);
  if(screen==="home") renderHome(); if(screen==="events") renderEvents();
}
async function askEvent(ev){
  if(!eventsRsvpRef||!cryptoKey){ alert("Keine Verbindung – bitte kurz später erneut."); return; }

  await ensureEventInfo(eid, ev);
  eventRsvp[eid].asked={by:profile, ts:Date.now()};

  openEventSheet(eventRsvp[eid].info||ev);
  if(screen==="home") renderHome();
}

function proposedEvents(){
  const t=new Date(); t.setHours(0,0,0,0);
  const arr=[];
  for(const eid in eventRsvp){
    const r=eventRsvp[eid]; if(!r||!r.info) continue;
    const cnt=MEMBERS.filter(n=>r.votes&&r.votes[n]===true).length; if(cnt<1) continue;
    const d=new Date(r.info.start); if(isNaN(d.getTime())||d<t) continue;
    arr.push({eid, ev:r.info, count:cnt});
  }
  arr.sort((a,b)=>String(a.ev.start).localeCompare(String(b.ev.start)));
  return arr;
}
function openNachfragen(){
  const t=new Date(); t.setHours(0,0,0,0);
  const arr=[];
  for(const eid in eventRsvp){
    const r=eventRsvp[eid]; if(!r||!r.info||!r.asked) continue;

}
function eventOfWeek(){
  const up=upcomingEvents(); if(!up.length) return null;
  const wk=new Date(); wk.setHours(0,0,0,0); const end=new Date(wk); end.setDate(end.getDate()+7);
  const week=up.filter(e=>{ const d=new Date(e.start); return d>=wk && d<end; });
  if(!week.length) return null;
  const liked=new Set();
  for(const id in ratings){ if(ratings[id]>=4){ const d=DATA.find(x=>x.id===id); if(d){ const m=d.addr.match(/Mainz|Wiesbaden|Ingelheim|Nierstein|Oppenheim|Bodenheim|Nackenheim|Budenheim/i); if(m) liked.add(m[0]); } } }
  return week.find(e=>e.city&&[...liked].some(c=>e.city.indexOf(c)>=0)) || week[0];
}

  const rAvg=rGiven?rated.reduce((s,d)=>s+rObj[d.id],0)/rGiven:0;

  return {doneN,total:DATA.length,rGiven,rAvg,cats,fav};
}

function eur(x){ return (Math.round(x*100)/100).toFixed(2).replace(".",",")+" €"; }
function kasseBalances(){
  const bal={}; MEMBERS.forEach(n=>bal[n]=0);
  Object.values(kasse).forEach(e=>{
    if(e.type==="expense"){
      const parts=(e.parts||[]).filter(n=>bal[n]!==undefined);
      if(!parts.length||!e.amount) return;
      const share=e.amount/parts.length;
      if(bal[e.payer]!==undefined) bal[e.payer]+=e.amount;
      parts.forEach(n=>{ bal[n]-=share; });
    } else if(e.type==="settle"){
      if(bal[e.from]!==undefined) bal[e.from]+=e.amount;
      if(bal[e.to]!==undefined) bal[e.to]-=e.amount;
    }
  });
  return bal;
}
function simplifyDebts(bal){
  const cred=[], deb=[];
  MEMBERS.forEach(n=>{ const v=Math.round((bal[n]||0)*100)/100; if(v>0.005) cred.push({n,v}); else if(v<-0.005) deb.push({n,v:-v}); });
  cred.sort((a,b)=>b.v-a.v); deb.sort((a,b)=>b.v-a.v);
  const out=[]; let i=0,j=0;
  while(i<deb.length&&j<cred.length){
    const pay=Math.min(deb[i].v,cred[j].v);
    out.push({from:deb[i].n,to:cred[j].n,amount:Math.round(pay*100)/100});
    deb[i].v-=pay; cred[j].v-=pay;
    if(deb[i].v<0.005)i++; if(cred[j].v<0.005)j++;
  }
  return out;
}

function fbDate(ts){ try{return new Date(ts).toLocaleDateString("de-DE",{day:"numeric",month:"short"});}catch(e){return "";} }
function feedbackRows(){
  const keys=Object.keys(feedbackList).sort((a,b)=>(feedbackList[b].ts||0)-(feedbackList[a].ts||0));
  if(!keys.length) return `<div class="fb-empty">Noch keine Meldungen – schreib die erste Idee rein. 💡</div>`;
  return keys.map(k=>{
    const f=feedbackList[k]; const st=(feedbackMeta[k]&&feedbackMeta[k].status)||"open"; const S=FB_STATUS[st]||FB_STATUS.open;
    const ver=(st==="done"&&feedbackMeta[k]&&feedbackMeta[k].ver)?" · v"+feedbackMeta[k].ver:"";
    return `<div class="fbi"><div class="fbi-top">${avatar(f.by||"?")}<span class="fbi-by">${esc(f.by||"?")}</span><span class="fbi-d">${fbDate(f.ts)}</span><button class="fbi-st ${S.cls}" data-fbk="${k}">${S.ic} ${S.label}${ver}</button></div><div class="fbi-t">${esc(f.text||"")}</div></div>`;
  }).join("");
}
function updatesRows(){
  const live=Object.keys(liveUpdates).map(k=>liveUpdates[k]).filter(u=>u&&u.t).sort((a,b)=>(b.ts||0)-(a.ts||0)).map(u=>({v:u.v||"",t:u.t}));
  return live.concat(CHANGELOG).map(c=>`<div class="chlog-item"><div class="chlog-v">${esc(c.v)}</div><div class="chlog-t">${esc(c.t)}</div></div>`).join("");
}
function renderFeedback(){
  const b=document.getElementById("fbbody"); if(!b) return;
  const prev=document.getElementById("fb-text"); const draft=prev?prev.value:"";
  b.innerHTML=`<div class="sheet-h"><h3>Feedback & Neuigkeiten</h3><button class="sheet-x" id="fb-x" aria-label="Schließen">×</button></div>
    <p class="fb-hint">Fehler entdeckt oder eine Idee? Schreib's hier rein – alle sehen den Stand (offen → in Arbeit → erledigt).</p>
    <textarea id="fb-text" placeholder="Dein Feedback…"></textarea>
    <button class="fb-send" id="fb-send">Absenden</button>
    <div class="fb-ok" id="fb-ok">Danke! Dein Feedback ist angekommen. 🙌</div>
    <div class="chlog"><div class="chlog-h">Eure Meldungen</div>${feedbackRows()}</div>
    <div class="chlog"><div class="chlog-h">Was ist neu · aktuell v${APP_VERSION}</div>${updatesRows()}</div>`;
  const ta=document.getElementById("fb-text"); if(ta&&draft) ta.value=draft;
  document.getElementById("fb-x").onclick=closeFeedback;
  document.getElementById("fb-send").onclick=submitFeedback;
  b.querySelectorAll(".fbi-st[data-fbk]").forEach(x=>x.onclick=()=>cycleFeedbackStatus(x.dataset.fbk));
}
function openFeedback(){
  const ov=document.getElementById("fbov"); if(!ov) return;
  renderFeedback();
  ov.classList.add("on");
  ov.onclick=e=>{ if(e.target===ov) closeFeedback(); };
}
function closeFeedback(){ const ov=document.getElementById("fbov"); if(ov) ov.classList.remove("on"); }
async function submitFeedback(){
  const t=document.getElementById("fb-text"); if(!t) return;
  const txt=(t.value||"").trim(); if(!txt){ t.focus(); return; }
  if(!(dbPath && cryptoKey && firebase.apps && firebase.apps.length)){ alert("Keine Verbindung – bitte später nochmal."); return; }
  try{
    await firebase.database().ref("groups/"+dbPath+"/feedback").push(await encryptObj(cryptoKey,{by:profile, text:txt, ts:Date.now(), ver:APP_VERSION}));
    t.value="";
    const ok=document.getElementById("fb-ok"); if(ok) ok.style.display="block";
  }catch(e){ alert("Konnte nicht senden. Bitte nochmal versuchen."); }
}

  sheet.innerHTML=`

    <h2>${esc(d.name)}</h2>

// Spot-Sheet nach unten wegwischen zum Schließen
(function(){
  const s=document.getElementById("sheet"); if(!s) return;
  let startY=0, dy=0, dragging=false;
  s.addEventListener("pointerdown",e=>{
    const onGrip=e.target&&e.target.classList&&e.target.classList.contains("grip");
    if(s.scrollTop>2 && !onGrip) return;
    dragging=true; startY=e.clientY; dy=0; s.style.transition="none";
  });
  s.addEventListener("pointermove",e=>{
    if(!dragging) return;
    dy=e.clientY-startY; if(dy<0) dy=0;
    if(dy>0) s.style.transform="translateY("+dy+"px)";
  });
  const end=()=>{ if(!dragging) return; dragging=false; s.style.transition=""; const close=dy>90; s.style.transform=""; if(close) closeSheet(); };
  s.addEventListener("pointerup",end);
  s.addEventListener("pointercancel",end);
})();

let spotsRef=null;
function subscribeSpots(db){
  spotsRef=db.ref("groups/"+dbPath+"/spots");
  spotsRef.on("value", async snap=>{
    const v=snap.val()||{}; const nx={};
    for(const id in v){ const d=await decryptObj(cryptoKey,v[id]); if(d){ d.id=id; nx[id]=d; } }
    customSpots=nx; rebuildData();
    if(screen==="bucket"){ renderTabs(); renderMain(); if(view==="karte"&&map)renderMap(); }
    if(screen==="home") renderHome();
    if(screen==="profile") renderProfile();
    const sheet=document.getElementById("sheet");
    if(sheet.classList.contains("open")&&customSpots[sheet.dataset.id]===undefined&&DATA.find(x=>x.id===sheet.dataset.id)===undefined){ closeSheet(); }
  });
}
async function saveSpot(spot){
  if(!spotsRef||!cryptoKey){ alert("Keine Verbindung – Spot kann gerade nicht gespeichert werden."); return null; }
  const id = spot.id || ("sp"+Date.now().toString(36)+Math.random().toString(36).slice(2,5));
  const rec={ name:spot.name, cat:spot.cat, desc:spot.desc||"", lat:spot.lat, lng:spot.lng, by:spot.by||profile, ts:spot.ts||Date.now() };
  customSpots[id]={ id, ...rec }; rebuildData();
  try{ await spotsRef.child(id).set(await encryptObj(cryptoKey,rec)); }catch(e){}
  return id;
}
async function deleteSpot(id){
  const s=customSpots[id]; if(!s||s.by!==profile)return;
  if(!confirm("Diesen Spot wirklich löschen?"))return;
  try{ await spotsRef.child(id).remove(); }catch(e){}
  delete customSpots[id]; rebuildData(); closeSheet();
  if(screen==="bucket"){ renderTabs(); renderMain(); if(view==="karte"&&map)renderMap(); }
}
let spotMap=null, spotMarker=null, spotPos=null, editSpotId=null;
function openSpotForm(id){
  editSpotId=id||null;
  const ex=id?customSpots[id]:null;
  spotPos=ex?[ex.lat,ex.lng]:null; spotMarker=null;
  const ov=document.getElementById("spotov");
  const catOpts=Object.keys(CATS).map(c=>`<option value="${c}" ${ex&&ex.cat===c?"selected":(!ex&&c===activeCat&&activeCat!=="alle"?"selected":"")}>${CATS[c].emoji} ${CATS[c].label}</option>`).join("");
  ov.innerHTML=`<div class="spotcard">
    <div class="spot-h"><h2>${id?"Spot bearbeiten":"Spot hinzufügen"}</h2><button class="spot-x" id="spotcancel">✕</button></div>
    <label class="fl">Name</label>
    <input class="finp" id="sp-name" placeholder="z. B. Geheimer Grillplatz" value="${ex?esc(ex.name):""}">
    <label class="fl">Kategorie</label>
    <select class="finp" id="sp-cat">${catOpts}</select>
    <label class="fl">Kurze Beschreibung</label>
    <textarea class="finp" id="sp-desc" rows="2" placeholder="Was ist das Besondere?">${ex?esc(ex.desc||""):""}</textarea>
    <label class="fl">Pin setzen — tippe auf die Karte</label>
    <div id="spotmap" class="spotmap"></div>
    <button class="btn check-btn" id="sp-loc" style="margin-top:8px">📍 Mein Standort verwenden</button>
    <p class="spot-hint" id="sp-hint"></p>
    <div class="spot-actions"><button class="btn check-btn done" id="sp-save">${id?"Speichern":"Spot anlegen"}</button></div>
  </div>`;
  ov.classList.add("show");
  setTimeout(()=>{
    if(typeof L==="undefined")return;
    spotMap=L.map("spotmap",{zoomControl:true}).setView(spotPos||[49.9992,8.2711], spotPos?15:12);
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OSM"}).addTo(spotMap);
    if(spotPos) setSpotMarker(spotPos);
    spotMap.on("click",e=>setSpotMarker([e.latlng.lat,e.latlng.lng]));
    setTimeout(()=>spotMap.invalidateSize(),120);
  },40);
  document.getElementById("spotcancel").onclick=closeSpotForm;
  document.getElementById("sp-loc").onclick=useMyLocation;
  document.getElementById("sp-save").onclick=submitSpot;
}
function setSpotMarker(pos){
  spotPos=pos;
  if(!spotMap)return;
  if(!spotMarker){ spotMarker=L.marker(pos,{draggable:true}).addTo(spotMap); spotMarker.on("dragend",()=>{const ll=spotMarker.getLatLng();spotPos=[ll.lat,ll.lng];}); }
  else spotMarker.setLatLng(pos);
  const hint=document.getElementById("sp-hint"); if(hint) hint.textContent="Pin gesetzt ✓";
}
function useMyLocation(){
  if(!navigator.geolocation){ alert("Standort auf diesem Gerät nicht verfügbar."); return; }
  const hint=document.getElementById("sp-hint"); if(hint) hint.textContent="Standort wird ermittelt…";
  navigator.geolocation.getCurrentPosition(p=>{
    const pos=[p.coords.latitude,p.coords.longitude];
    if(spotMap) spotMap.setView(pos,15); setSpotMarker(pos);
  },()=>{ if(hint) hint.textContent="Standort konnte nicht ermittelt werden."; });
}
function closeSpotForm(){
  const ov=document.getElementById("spotov"); ov.classList.remove("show");
  if(spotMap){ try{spotMap.remove();}catch(e){} spotMap=null; }
  spotMarker=null; spotPos=null; editSpotId=null; ov.innerHTML="";
}
async function submitSpot(){
  const name=document.getElementById("sp-name").value.trim();
  const cat=document.getElementById("sp-cat").value;
  const desc=document.getElementById("sp-desc").value.trim();
  const hint=document.getElementById("sp-hint");
  if(!name){ hint.textContent="Bitte einen Namen eingeben."; return; }
  if(!spotPos){ hint.textContent="Bitte einen Pin auf der Karte setzen."; return; }
  const ex=editSpotId?customSpots[editSpotId]:null;
  const id=await saveSpot({ id:editSpotId, name, cat, desc, lat:spotPos[0], lng:spotPos[1], by:ex?ex.by:profile, ts:ex?ex.ts:Date.now() });
  closeSpotForm();
  if(id){ setScreen("bucket"); activeCat="alle"; renderTabs(); renderMain(); if(view==="karte")renderMap(); setTimeout(()=>openSheet(id),180); }
}

// ======== Kommentare (einer pro Person & Spot, max. 60 Zeichen) ========
let commentsRef=null, comments={};
function subscribeComments(db){
  commentsRef=db.ref("groups/"+dbPath+"/comments");
  commentsRef.on("value", async snap=>{
    const v=snap.val()||{}; const nx={};
    for(const sid in v){ nx[sid]={}; for(const usr in v[sid]){ const d=await decryptObj(cryptoKey,v[sid][usr]); if(d&&d.text) nx[sid][usr]={text:d.text,ts:d.ts||0}; } }
    comments=nx;
    const sheet=document.getElementById("sheet");
    if(sheet.classList.contains("open")&&sheet.dataset.id){ const inp=document.getElementById("cinput"); if(!inp||document.activeElement!==inp) renderComments(sheet.dataset.id); }
  }, err=>{});
}
async function saveComment(spotId,text){
  if(!commentsRef||!cryptoKey){ alert("Keine Verbindung – Kommentar kann gerade nicht gespeichert werden."); return; }
  const t=(text||"").trim().slice(0,60);
  if(!comments[spotId]) comments[spotId]={};
  if(!t){
    delete comments[spotId][profile];
    try{ await commentsRef.child(spotId).child(profile).remove(); }catch(e){}
    return;
  }
  const rec={text:t, ts:Date.now()};
  comments[spotId][profile]=rec;
  try{ await commentsRef.child(spotId).child(profile).set(await encryptObj(cryptoKey,rec)); }catch(e){}
}
function renderComments(spotId){
  const el=document.getElementById("commentbox"); if(!el)return;
  const cs=comments[spotId]||{};
  const mine=cs[profile]?cs[profile].text:"";
  const all=MEMBERS.filter(n=>cs[n]&&cs[n].text).sort((a,b)=>(cs[a].ts||0)-(cs[b].ts||0));
  let h=`<h3>Kommentare</h3>`;
  if(all.length){
    all.forEach(n=>{ h+=`<div class="cmt">${avatar(n)}<div class="cbody"><span class="cnm">${n}${n===profile?" (du)":""}</span><span class="ctxt">${esc(cs[n].text)}</span></div></div>`; });
  } else {
    h+=`<div class="pnone">Noch keine Kommentare. Sag den anderen, was du denkst!</div>`;
  }
  h+=`<div class="cinput-wrap"><input class="cinput" id="cinput" maxlength="60" placeholder="Dein Kommentar (max. 60 Zeichen)" value="${esc(mine)}"><button class="cbtn" id="csave">${mine?"Ändern":"Senden"}</button></div><div class="ccount" id="ccount"></div>`;
  el.innerHTML=h;
  const inp=document.getElementById("cinput"), cnt=document.getElementById("ccount"), btn=document.getElementById("csave");
  const upd=()=>{ cnt.textContent=inp.value.length+"/60"; };
  upd(); inp.oninput=upd;
  const doSave=async()=>{ btn.disabled=true; await saveComment(spotId, inp.value); renderComments(spotId); };
  btn.onclick=doSave;
  inp.onkeydown=e=>{ if(e.key==="Enter"){ e.preventDefault(); doSave(); } };
}

let map=null, markerLayer=null, lastFitKey="";
function initMap(){
  if(map||typeof L==="undefined")return;
  map=L.map("map",{zoomControl:true});
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap"}).addTo(map);
  markerLayer=L.layerGroup().addTo(map);
  map.setView([49.9929,8.2473],13);
}
function renderMap(){
  if(!map)return;
  markerLayer.clearLayers();
  const pts=[];
  DATA.filter(matches).forEach(d=>{
    const who=whoDone(d.id);
    const m=L.circleMarker(d.geo,{radius:8,color:"#fff",weight:2,fillColor:done[d.id]?"#2FA36B":"#D21E5A",fillOpacity:.95});
    const av=who.length?who.map(avatar).join("")+"<br>":"";
    m.bindPopup(`<b>${done[d.id]?"✓ ":""}${d.name}</b>${av}<a href="#" onclick="openSheet('${d.id}');return false;">Details ›</a>`);
    m.addTo(markerLayer); pts.push(d.geo);
  });
  const fitKey=activeCat+"|"+filter+"|"+query;
  if(pts.length&&fitKey!==lastFitKey){ map.fitBounds(pts,{padding:[28,28],maxZoom:15}); lastFitKey=fitKey; }
}

async function boot(){
  const ov=document.getElementById("overlay");
  if(!groupCode){ showJoinNeeded(); return; }
  if(!profile){ showProfilePicker(); return; }
  loadLocal();
  loadNotifPrefs();
  ov.classList.remove("show");
  let startScreen="home";
  try{ const sc=new URLSearchParams(location.search).get("scr"); if(["home","bucket","events","trips","chat","profile"].includes(sc)) startScreen=sc; }catch(e){}
  setScreen("home");
  // iOS: erst Home layouten lassen, dann auf Ziel-Screen wechseln (sonst sitzt die untere Leiste auf kurzen Seiten falsch)
  if(startScreen!=="home"){ setTimeout(()=>setScreen(startScreen), 60); }
  updateAppbar();
  loadEvents();
  setSync(false,"verbinde…");
  try{
    cryptoKey=await deriveKey(groupCode);
    dbPath=await derivePath(groupCode);
    initFirebase();
  }catch(e){ setSync(false,"offline"); }
}
// ======== Pull-to-Refresh (für Home-Bildschirm-App) ========
(function(){
  const ptr=document.getElementById("ptr"), txt=document.getElementById("ptrtxt");
  const THRESH=70; let startY=0, pulling=false, dist=0;
  function canPull(t){
    if(window.scrollY>0) return false;
    if(document.getElementById("sheet").classList.contains("open")) return false;
    if(document.getElementById("overlay").classList.contains("show")) return false;
    if(t&&t.closest&&(t.closest("#map")||t.closest(".leaflet-container"))) return false;
    return true;
  }
  window.addEventListener("touchstart",e=>{ if(canPull(e.target)){ startY=e.touches[0].clientY; pulling=true; dist=0; } },{passive:true});
  window.addEventListener("touchmove",e=>{
    if(!pulling) return;
    dist=e.touches[0].clientY-startY;
    if(dist>0){ ptr.style.transition="transform 0s"; ptr.style.transform="translateY("+(Math.min(dist*0.5,80)-56)+"px)"; txt.textContent = dist>THRESH ? "Loslassen zum Aktualisieren" : "Zum Aktualisieren ziehen"; }
  },{passive:true});
  window.addEventListener("touchend",()=>{
    if(!pulling) return; pulling=false;
    if(dist>THRESH){ ptr.style.transition="transform .2s"; ptr.style.transform="translateY(0)"; ptr.classList.add("spinning"); txt.textContent="Aktualisiere\u2026"; setTimeout(()=>{ location.replace(location.pathname+"?r="+Date.now()+"&scr="+screen+(location.hash||"")); },250); }
    else { ptr.style.transition="transform .25s"; ptr.style.transform="translateY(-56px)"; }
  },{passive:true});
})();
// ======== Service Worker (Offline-Fähigkeit) ========
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").then(reg=>{ try{reg.update();}catch(e){} }).catch(()=>{});
  });
}
boot();
</script>
</body>
