name: Update Events

on:
  schedule:
    - cron: "0 5 * * 1"   # jeden Montag 05:00 UTC
  workflow_dispatch: {}    # + manuell startbar

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Events scrapen
        run: node scrape-events.js
      - name: Commit bei Änderung
        run: |
          if [ -n "$(git status --porcelain events.json)" ]; then
            git config user.name "Agraffen Bot"
            git config user.email "actions@users.noreply.github.com"
            git add events.json
            git commit -m "Auto-Update Events ($(date +%F))"
            git push
          else
            echo "Keine Aenderungen an events.json."
          fi
